<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=600,initial-scale=1" />
    <title>prompt-launcher</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="overlay" class="overlay" role="dialog" aria-label="Prompt launcher">
      <div class="input-row">
        <svg
          class="glyph"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="11" cy="11" r="7" />
          <path d="m20 20-3.5-3.5" />
        </svg>
        <input
          id="q"
          type="text"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
          placeholder="Search prompts…"
        />
        <span class="esc-pill">esc</span>
      </div>
      <div class="list-wrap">
        <ul class="list" id="list"></ul>
      </div>
      <div class="status">
        <span class="brand-mark"><span class="dot-accent"></span><span class="brand">prompt-launcher</span></span>
        <span class="status-right">
          <span class="kbd"><kbd>↑</kbd><kbd>↓</kbd>&nbsp;navigate</span>
          <span class="kbd"><kbd>↵</kbd>&nbsp;paste</span>
          <span class="kbd"><kbd>esc</kbd>&nbsp;dismiss</span>
          <span class="count" id="count">— results</span>
        </span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
